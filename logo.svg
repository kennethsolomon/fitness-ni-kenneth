<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0B12"/>
      <stop offset="100%" stop-color="#221B2E"/>
    </linearGradient>

    <!-- Bar gradient (left: Ice Cold → right: Purple Pain) -->
    <linearGradient id="barGrad" x1="132" y1="0" x2="380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a0d2eb"/>
      <stop offset="100%" stop-color="#8458B3"/>
    </linearGradient>

    <!-- Left plate gradient -->
    <linearGradient id="plateLGrad" x1="0" y1="176" x2="0" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9a65c4"/>
      <stop offset="100%" stop-color="#6a3d96"/>
    </linearGradient>

    <!-- Right plate gradient -->
    <linearGradient id="plateRGrad" x1="0" y1="176" x2="0" y2="336" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9a65c4"/>
      <stop offset="100%" stop-color="#6a3d96"/>
    </linearGradient>

    <!-- Ambient glow behind barbell -->
    <filter id="ambientGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur"/>
    </filter>

    <!-- Bar glow -->
    <filter id="barGlow" x="-5%" y="-80%" width="110%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Collar glow -->
    <filter id="collarGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background (iOS rounded square) -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>

  <!-- Ambient purple glow behind barbell -->
  <rect x="88" y="220" width="336" height="72" rx="36" fill="#8458B3" opacity="0.25" filter="url(#ambientGlow)"/>
  <rect x="40" y="184" width="120" height="144" rx="20" fill="#8458B3" opacity="0.15" filter="url(#ambientGlow)"/>
  <rect x="352" y="184" width="120" height="144" rx="20" fill="#a0d2eb" opacity="0.10" filter="url(#ambientGlow)"/>

  <!-- ═══ LEFT PLATE ═══ -->
  <!-- Outer left plate (big, bold) -->
  <rect x="40" y="176" width="48" height="160" rx="12" fill="url(#plateLGrad)"/>
  <!-- Highlight edge -->
  <rect x="40" y="188" width="5" height="136" rx="2.5" fill="#d0bdf4" opacity="0.3"/>
  <!-- Inner detail lines -->
  <rect x="52" y="200" width="3" height="112" rx="1.5" fill="#d0bdf4" opacity="0.15"/>
  <rect x="60" y="200" width="3" height="112" rx="1.5" fill="#d0bdf4" opacity="0.10"/>

  <!-- ═══ LEFT COLLAR ═══ -->
  <rect x="88" y="220" width="44" height="72" rx="8" fill="#a0d2eb" filter="url(#collarGlow)"/>
  <!-- Collar shine -->
  <rect x="90" y="224" width="6" height="64" rx="3" fill="white" opacity="0.20"/>

  <!-- ═══ CENTER BAR ═══ -->
  <rect x="132" y="246" width="248" height="20" rx="10" fill="url(#barGrad)" filter="url(#barGlow)"/>
  <!-- Bar top highlight -->
  <rect x="140" y="246" width="232" height="4" rx="2" fill="white" opacity="0.15"/>

  <!-- ═══ RIGHT COLLAR ═══ -->
  <rect x="380" y="220" width="44" height="72" rx="8" fill="#a0d2eb" filter="url(#collarGlow)"/>
  <!-- Collar shine -->
  <rect x="382" y="224" width="6" height="64" rx="3" fill="white" opacity="0.20"/>

  <!-- ═══ RIGHT PLATE ═══ -->
  <rect x="424" y="176" width="48" height="160" rx="12" fill="url(#plateRGrad)"/>
  <!-- Highlight edge -->
  <rect x="467" y="188" width="5" height="136" rx="2.5" fill="#d0bdf4" opacity="0.3"/>
  <!-- Inner detail lines -->
  <rect x="457" y="200" width="3" height="112" rx="1.5" fill="#d0bdf4" opacity="0.15"/>
  <rect x="449" y="200" width="3" height="112" rx="1.5" fill="#d0bdf4" opacity="0.10"/>

  <!-- ═══ SMALL WATCH INDICATOR (bottom-right accent) ═══ -->
  <!-- Small rounded rect (watch shape) -->
  <rect x="340" y="316" width="36" height="44" rx="9" fill="none" stroke="#a0d2eb" stroke-width="2.5" opacity="0.6"/>
  <!-- Watch crown -->
  <rect x="376" y="330" width="6" height="16" rx="3" fill="#a0d2eb" opacity="0.5"/>
  <!-- Watch pulse line -->
  <polyline points="345,338 352,338 356,328 360,348 364,332 368,338 371,338"
            fill="none" stroke="#a0d2eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

</svg>
